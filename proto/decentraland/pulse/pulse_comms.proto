syntax = "proto3";

package decentraland.pulse;

import "decentraland/common/options.proto";

message HandshakeRequest {
	bytes auth_chain = 1;
}

message HandshakeResponse {
  bool success = 1;
  optional string error = 2;
}

message ClientMessage {
  oneof message {
    HandshakeRequest handshake = 1;
    PlayerStateFull player_state_full = 2;
  }
}

message ServerMessage {
  oneof message {
      HandshakeResponse handshake = 1;
      PlayerStateFull player_state_full = 2;
      PlayerStateDeltaTier0 player_state_delta = 3;
      PlayerJoined player_joined = 4;
  }
}

enum PlayerAnimationFlags {
  NONE = 0;
  GROUNDED = 1;
  LONG_JUMP = 2;
  LONG_FALL = 4;
  FALLING = 8;
  STUNNED = 16;
}

enum GlideState {
  PROP_CLOSED = 0;
  OPENING_PROP = 1;
  GLIDING = 2;
  CLOSING_PROP = 3;
}

message PlayerState {
  uint32 subject_id = 1;
  uint32 sequence = 2;
  uint32 server_tick = 3;

  Vector3 position = 4;
  Vector3 velocity = 5;

  float rotation_y = 6;

  float movement_blend = 7;
  float slide_blend = 8;

  optional float head_yaw = 9;
  optional float head_pitch = 10;

  uint32 state_flags = 11;
  GlideState glide_state = 12;
}

message PlayerStateDeltaTier0 {
  uint32 subject_id = 1;
  uint32 new_seq = 2;
  uint32 server_tick = 3;

  optional uint32 position_x = 4;
  optional uint32 position_y = 5;
  optional uint32 position_z = 6;

  optional uint32 velocity_x = 7;
  optional uint32 velocity_y = 8;
  optional uint32 velocity_z = 9;

  optional uint32 rotation_y = 10 [(decentraland.common.quantized) = { min:  0,  max:   360.0, bits: 7 }];
  optional uint32 movement_blend = 11;
  optional uint32 slide_blend = 12;
  optional uint32 head_yaw = 13 [(decentraland.common.quantized) = { min:  0,  max:   360.0, bits: 7 }];
  optional uint32 head_pitch = 14 [(decentraland.common.quantized) = { min:  0,  max:   180.0, bits: 6 }];

  uint32 state_flags = 15;
}

message PlayerStateFull {
  PlayerState state = 1;
}

message PlayerJoined {
  string user_id = 1;
  PlayerState state = 2;
}

message Vector3 {
  float x = 1;
  float y = 2;
  float z = 3;
}