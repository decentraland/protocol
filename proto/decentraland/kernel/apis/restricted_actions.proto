syntax = "proto3";
package decentraland.kernel.apis;

import "decentraland/common/vectors.proto";
import "decentraland/sdk/components/common/avatar_mask.proto";

message MovePlayerToRequest {
  decentraland.common.Vector3 new_relative_position = 1;
  optional decentraland.common.Vector3 camera_target = 2;
  optional decentraland.common.Vector3 avatar_target = 3;
  optional float duration = 4; // by default (no duration param) the player is instantly moved and not interpolated
}

message TeleportToRequest {
  decentraland.common.Vector2 world_coordinates = 1;
}

message TriggerEmoteRequest {
  string predefined_emote = 1;
  optional decentraland.sdk.components.common.AvatarMask mask = 2;
}

message ChangeRealmRequest {
  string realm = 1;
  optional string message = 2;
}

message OpenExternalUrlRequest {
  string url = 1;
}

message OpenNftDialogRequest {
  string urn = 1;
}

message UnblockPointerRequest {}

message CommsAdapterRequest {
  string connection_string = 1;
}

message TriggerSceneEmoteRequest {
  string src = 1;
  optional bool loop = 2;
  optional decentraland.sdk.components.common.AvatarMask mask = 3;
}

message SuccessResponse {
  bool success = 1;
}

message TriggerEmoteResponse { }

message MovePlayerToResponse { 
  bool success = 1;
}

message TeleportToResponse { }

message CopyToClipboardRequest {
  string text = 1;
}

message EmptyResponse { }

message StopEmoteRequest { }

// Identifies which fullscreen explorer panel OpenExplorerUi targets.
// Additive: new panels are appended with the next number; existing values never change.
enum ExplorerUi {
  EU_UNSPECIFIED = 0;
  EU_MAP = 1;
  EU_SETTINGS = 2;
  EU_BACKPACK = 3;
  EU_CAMERA_REEL = 4;
  EU_COMMUNITIES = 5;
  EU_PLACES = 6;
  EU_EVENTS = 7;
}

// Verdict of an OpenExplorerUi request (enum rather than a bool so new outcomes stay expressible).
// Additive: new rejection reasons may be appended; existing values never change.
enum OpenExplorerUiResult {
  UNSPECIFIED = 0;
  OPENED = 1;
  REJECTED_NOT_CURRENT_SCENE = 2;   // the standard restricted-actions current-scene gate rejected the call
  REJECTED_ALREADY_OPEN = 3;        // a fullscreen panel is already open
  REJECTED_FEATURE_DISABLED = 4;    // the requested section is hidden by feature flags or client doesn't have that feature
  REJECTED_NO_USER_GESTURE = 5;     // rejected: the call did not originate from a user gesture
}

message OpenExplorerUiRequest {
  ExplorerUi ui = 1;

  // Extension point for future per-panel parameters, as a oneof so each panel gets its
  // own optional param message without touching existing fields. Field numbers 10+ are
  // for these params, e.g.:
  //   message MapParams { int32 focus_x = 1; int32 focus_y = 2; }
  //   oneof params { MapParams map = 10; }
}

message OpenExplorerUiResponse {
  // Carries only the verdict of the open action. Post-open signals (panel closed, flow
  // outcomes, milestones) are deliberately out of scope here and are delivered through a
  // separate additive event channel (a grow-only scene component), keeping this contract stable.
  OpenExplorerUiResult open_result = 1;
}

service RestrictedActionsService {
  // MovePlayerTo will move the player to a position relative to the current scene.
  // If 'duration' field is used in the request, the success response depends on the
  // whole interpolation being completed or interrupted (e.g: by input movement)
  rpc MovePlayerTo(MovePlayerToRequest) returns (MovePlayerToResponse) {}

  // TeleportTo will move the user to the specified world LAND parcel coordinates
  rpc TeleportTo(TeleportToRequest) returns (TeleportToResponse) {}

  // TriggerEmote will trigger an emote in this current user
  rpc TriggerEmote(TriggerEmoteRequest) returns (TriggerEmoteResponse) {}

  // ChangeRealm prompts the user to change to a specific realm
  rpc ChangeRealm(ChangeRealmRequest) returns (SuccessResponse) {}

  // OpenExternalUrl prompts the user to open an external link
  rpc OpenExternalUrl(OpenExternalUrlRequest) returns (SuccessResponse) {}

  // OpenNftDialog opens an NFT dialog.
  rpc OpenNftDialog(OpenNftDialogRequest) returns (SuccessResponse) {}

  // Asks the explorer to connect to other communications adapter, this feature
  // can be used to join private game servers
  rpc SetCommunicationsAdapter(CommsAdapterRequest) returns (SuccessResponse) {}

  // TriggerSceneEmote will trigger an scene emote file in this current user
  rpc TriggerSceneEmote(TriggerSceneEmoteRequest) returns (SuccessResponse) {}

  // CopyToClipboard copies the provided text into the clipboard
  rpc CopyToClipboard(CopyToClipboardRequest) returns (EmptyResponse) {}

  // StopEmote will stop the current emote
  rpc StopEmote(StopEmoteRequest) returns (SuccessResponse) {}

  // OpenExplorerUi opens a specific fullscreen explorer panel and returns the open verdict.
  // Follows the same scene->explorer pathway as OpenNftDialog / OpenExternalUrl.
  rpc OpenExplorerUi(OpenExplorerUiRequest) returns (OpenExplorerUiResponse) {}
}
