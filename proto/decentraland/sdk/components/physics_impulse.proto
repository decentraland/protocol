syntax = "proto3";

package decentraland.sdk.components;

import "decentraland/common/vectors.proto";
import "decentraland/sdk/components/common/id.proto";

option (common.ecs_component_id) = 1415;

/**
 * @internal Low-level component. Use Physics.applyImpulseToPlayer() instead.
 * Direct manipulation will conflict with the force accumulation registry.
 */
// This component applies a one-shot physics summary impulse.
// In case of several impulses, scene should accumulate.
// The direction vector is non-normalized: its magnitude encodes the impulse strength.
// Event-like component: each new impulse must increment the eventID to ensure delivery via CRDT, even if 
// the direction is identical to the previous one.
// After the renderer processes the impulse, it is consumed. Increase eventID of the component to apply another impulse.
message PBPhysicsImpulse {
  // Impulse vector in world space. The vector length represents the impulse magnitude.
  decentraland.common.Vector3 vector = 1;

  // Monotonic counter to distinguish repeated impulses with the same direction.
  uint32 eventID = 2;
}
