syntax = "proto3";
package decentraland.sdk.components;
import "decentraland/sdk/components/common/id.proto";
import "decentraland/sdk/components/common/input_action.proto";
option (common.ecs_component_id) = 1504;

// The TouchButton component configures one of the native on-screen touch controls (the
// action buttons of the mobile gamepad). It is placed on a child entity of the reserved
// Screen entity; the `button` field selects which on-screen control it configures.
//
// As soon as a scene declares any TouchButton, the on-screen gamepad enters "managed"
// mode: only the declared buttons are shown (and only when `visible` is not false), and
// every other button is hidden. A scene that declares no TouchButton keeps the default
// gamepad unchanged. It is a no-op on platforms without native on-screen controls (e.g.
// desktop).
message PBTouchButton {
    common.InputAction button = 1;    // which on-screen button this configures (ia_primary, ia_jump, ia_action_3..6, ia_pointer, ...)
    optional bool visible = 2;        // whether the button is shown (default true)
    optional bool disabled = 3;       // shown greyed out and not interactive (default false)
    optional string icon = 4;         // custom icon (content-mapped texture src); empty = built-in icon for the action
    optional float progress = 5;      // 0..1 radial progress ring around the button; absent = no ring
}
