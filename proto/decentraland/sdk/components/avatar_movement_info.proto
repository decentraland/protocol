syntax = "proto3";

package decentraland.sdk.components;

import "decentraland/sdk/components/common/id.proto";

option (common.ecs_component_id) = 3000;

message PBAvatarMovementInfo {
  float step_time = 1;                                      // the length of time the current step velocity will apply for
  float previous_step_time = 2;                             // the length of time the previous step velocity applied for
  decentraland.common.Vector3 requested_velocity = 2;       // the velocity requested for the previous frame
  decentraland.common.Vector3 actual_velocity = 3;          // the resulting velocity taking collisions into account
  decentraland.common.Vector3 external_velocity = 4;        // the velocity imparted by movement of the "ground" platform or pushing from other moving colliders
}

message AvatarMovement {
  decentraland.common.Vector3 velocity = 1;
  float orientation = 2; // 0-360, we don't allow pitch/roll
  optional Vector3 ground_direction = 3;
}
